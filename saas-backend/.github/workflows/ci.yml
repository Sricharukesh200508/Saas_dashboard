name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: saasuser
          POSTGRES_PASSWORD: saaspassword
          POSTGRES_DB: saasdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry==1.8.3
        poetry install
    - name: Lint with ruff
      run: poetry run ruff check app/ tests/
    - name: Test with pytest
      env:
        DATABASE_URL: postgresql+asyncpg://saasuser:saaspassword@localhost:5432/saasdb
        REDIS_URL: redis://localhost:6379/0
        ENVIRONMENT: test
      run: |
        poetry run pytest tests/ --cov=app --cov-report=xml

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build -t saas-backend:latest .
    # In a real scenario, we would push to ECR/GCR here.
