version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    volumes:
      - ./app:/app/app
      - ./seed.py:/app/seed.py
    restart: unless-stopped
    networks:
      - saas_network

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker -l info --concurrency=8
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    networks:
      - saas_network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat -l info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    networks:
      - saas_network

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: saasuser
      POSTGRES_PASSWORD: saaspassword
      POSTGRES_DB: saasdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saasuser -d saasdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saas_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - saas_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - saas_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - saas_network

volumes:
  postgres_data:
  redis_data:

networks:
  saas_network:
    driver: bridge
