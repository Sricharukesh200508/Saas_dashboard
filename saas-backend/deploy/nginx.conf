worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    keepalive_timeout 65;

    # Basic Rate Limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream fastapi_backend {
        # 'api' is the docker service name
        server api:8000;
    }

    server {
        listen 80;
        server_name api.yourdomain.com; # Change this to your domain

        # Redirect all HTTP traffic to HTTPS (uncomment when SSL is set up)
        # return 301 https://$host$request_uri;

        # Remove the block below when SSL is set up
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Uncomment the block below after generating SSL certificates with Let's Encrypt / Certbot
    # server {
    #     listen 443 ssl http2;
    #     server_name api.yourdomain.com;
    # 
    #     ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    # 
    #     location / {
    #         limit_req zone=api_limit burst=20 nodelay;
    # 
    #         proxy_pass http://fastapi_backend;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         
    #         # WebSocket support
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #     }
    # }
}
